<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Recettes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* gray-100 */
            -webkit-tap-highlight-color: transparent;
        }

        .view-transition {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .hidden-view {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }

        .active-view {
            opacity: 1;
            transform: translateY(0);
            position: relative;
        }

        /* Personnalisation de la scrollbar pour un look plus clean sur desktop */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen pb-10 relative overflow-x-hidden">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <button id="backBtn" class="p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors hidden" aria-label="Retour">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                </svg>
            </button>
            <h1 id="headerTitle" class="text-lg font-semibold text-center flex-1">Sélectionnez une langue</h1>
            
            <div class="relative">
                <button id="langBtn" class="p-2 -mr-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
                    </svg>
                    <span id="currentLangDisplay" class="text-xs font-medium uppercase">FR</span>
                </button>
                
                <!-- Menu déroulant langues -->
                <div id="langMenu" class="hidden absolute right-0 mt-2 w-32 bg-white rounded-xl shadow-lg border border-gray-100 py-1 z-50">
                    <button class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex items-center justify-between" onclick="setLanguage('fr')">Français <span id="check-fr" class="text-blue-500">✓</span></button>
                    <button class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex items-center justify-between" onclick="setLanguage('en')">English <span id="check-en" class="text-blue-500 hidden">✓</span></button>
                    <button class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex items-center justify-between" onclick="setLanguage('ko')">한국어 <span id="check-ko" class="text-blue-500 hidden">✓</span></button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 relative">
        
        <div id="welcomeView" class="view-transition active-view flex flex-col items-center justify-center min-h-[60vh]">
            <div class="text-center mb-8">
                <span class="text-4xl mb-4 block">👨‍🍳</span>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Bienvenue !</h2>
                <p class="text-gray-500">Choisissez votre langue pour commencer.</p>
            </div>
            
            <div class="w-full max-w-xs flex flex-col gap-3">
                <button onclick="initApp('fr')" class="w-full bg-white border border-gray-200 text-gray-800 font-medium py-4 px-6 rounded-2xl shadow-sm hover:shadow-md hover:border-blue-300 active:scale-95 transition-all flex items-center justify-between">
                    <span class="text-xl">🇫🇷</span>
                    <span>Français</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
                
                <button onclick="initApp('en')" class="w-full bg-white border border-gray-200 text-gray-800 font-medium py-4 px-6 rounded-2xl shadow-sm hover:shadow-md hover:border-blue-300 active:scale-95 transition-all flex items-center justify-between">
                    <span class="text-xl">🇬🇧</span>
                    <span>English</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
                
                <button onclick="initApp('ko')" class="w-full bg-white border border-gray-200 text-gray-800 font-medium py-4 px-6 rounded-2xl shadow-sm hover:shadow-md hover:border-blue-300 active:scale-95 transition-all flex items-center justify-between">
                    <span class="text-xl">🇰🇷</span>
                    <span>한국어</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>

        <div id="listView" class="view-transition hidden-view">
            <h2 id="listTitle" class="text-2xl font-bold mb-6 text-gray-900 px-1 mt-2">Mes Recettes</h2>
            <div id="recipeList" class="flex flex-col gap-4">
                <!-- Les cartes de recettes seront injectées ici par JS -->
            </div>
        </div>

        <div id="detailView" class="view-transition hidden-view">
            <div class="bg-white rounded-3xl shadow-sm overflow-hidden mb-6">
                <!-- Image générique avec couleur de fond basée sur la recette -->
                <div id="recipeHeader" class="h-32 bg-gradient-to-br from-orange-400 to-red-500 flex items-center justify-center">
                    <span id="recipeEmoji" class="text-6xl drop-shadow-md">🥓</span>
                </div>
                
                <div class="p-6">
                    <h2 id="detailTitle" class="text-2xl font-bold text-gray-900 mb-6 pb-4 border-b border-gray-100">Titre de la recette</h2>
                    
                    <div class="mb-8">
                        <h3 id="ingredientsTitle" class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                            Ingrédients
                        </h3>
                        <ul id="ingredientsList" class="grid grid-cols-1 gap-y-2 text-gray-700 bg-gray-50 p-4 rounded-2xl">
                            <!-- Ingrédients injectés ici -->
                        </ul>
                    </div>
                    
                    <div>
                        <h3 id="stepsTitle" class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                            Étapes
                        </h3>
                        <div id="stepsList" class="space-y-4">
                            <!-- Étapes injectées ici -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>

        let currentLang = 'fr'; // par défaut mais non utilisé avant sélection
        let currentView = 'welcomeView';
        let activeRecipeId = null;

        const translations = {
            fr: {
                headerSelect: "Sélectionnez une langue",
                headerApp: "Recettes",
                listTitle: "Mes Recettes",
                ingredients: "Ingrédients",
                steps: "Étapes",
                stepPrefix: "Étape"
            },
            en: {
                headerSelect: "Select a language",
                headerApp: "Recipes",
                listTitle: "My Recipes",
                ingredients: "Ingredients",
                steps: "Steps",
                stepPrefix: "Step"
            },
            ko: {
                headerSelect: "언어 선택",
                headerApp: "레시피",
                listTitle: "내 레시피",
                ingredients: "재료",
                steps: "조리 순서",
                stepPrefix: "단계"
            }
        };

        function switchView(viewId) {
            // Masquer la vue courante
            document.getElementById(currentView).classList.remove('active-view');
            document.getElementById(currentView).classList.add('hidden-view');
            
            // Afficher la nouvelle vue
            const newView = document.getElementById(viewId);
            newView.classList.remove('hidden-view');
            // Petit délai pour permettre l'application de la classe hidden-view sur l'ancien élément
            setTimeout(() => {
                newView.classList.add('active-view');
            }, 10);
            
            currentView = viewId;
            updateHeader();
        }

        function updateHeader() {
            const backBtn = document.getElementById('backBtn');
            const headerTitle = document.getElementById('headerTitle');
            const langBtn = document.getElementById('langBtn');

            if (currentView === 'welcomeView') {
                backBtn.classList.add('hidden');
                langBtn.classList.add('invisible'); // On le cache sur l'accueil car on choisit en grand
                headerTitle.textContent = translations[currentLang]?.headerSelect || "Sélectionnez une langue";
            } else if (currentView === 'listView') {
                backBtn.classList.add('hidden');
                langBtn.classList.remove('invisible');
                headerTitle.textContent = translations[currentLang].headerApp;
            } else if (currentView === 'detailView') {
                backBtn.classList.remove('hidden');
                langBtn.classList.remove('invisible');
                // Le titre est mis à jour lors du rendu de la recette
                const recipe = recipesData.find(r => r.id === activeRecipeId);
                headerTitle.textContent = recipe.title[currentLang];
            }
        }

        function initApp(lang) {
            setLanguage(lang);
            switchView('listView');
        }

        function setLanguage(lang) {
            currentLang = lang;
            
            // Mettre à jour l'affichage du bouton langue
            document.getElementById('currentLangDisplay').textContent = lang;
            
            // Mettre à jour les checks dans le menu
            ['fr', 'en', 'ko'].forEach(l => {
                const check = document.getElementById(`check-${l}`);
                if (l === lang) {
                    check.classList.remove('hidden');
                } else {
                    check.classList.add('hidden');
                }
            });

            // Fermer le menu
            document.getElementById('langMenu').classList.add('hidden');

            // Mettre à jour l'UI statique
            document.getElementById('listTitle').textContent = translations[lang].listTitle;
            document.getElementById('ingredientsTitle').innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>${translations[lang].ingredients}`;
            document.getElementById('stepsTitle').innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>${translations[lang].steps}`;

            // Re-rendre les vues en fonction de la langue
            renderRecipeList();
            if (currentView === 'detailView' && activeRecipeId) {
                renderRecipeDetail(activeRecipeId);
            }
            updateHeader();
        }

        function renderRecipeList() {
            const listContainer = document.getElementById('recipeList');
            listContainer.innerHTML = '';

            recipesData.forEach(recipe => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer";
                card.onclick = () => openRecipe(recipe.id);

                const iconDiv = document.createElement('div');
                iconDiv.className = `w-14 h-14 rounded-xl flex items-center justify-center text-2xl bg-gradient-to-br ${recipe.color} text-white shadow-inner flex-shrink-0`;
                iconDiv.textContent = recipe.emoji;

                const textDiv = document.createElement('div');
                textDiv.className = "flex-1";
                
                const title = document.createElement('h3');
                title.className = "font-semibold text-gray-900 text-lg";
                title.textContent = recipe.title[currentLang];
                
                const meta = document.createElement('p');
                meta.className = "text-sm text-gray-500 mt-1";
                meta.textContent = `${recipe.ingredients[currentLang].length} ${translations[currentLang].ingredients.toLowerCase()}`;

                const arrowDiv = document.createElement('div');
                arrowDiv.className = "text-gray-300";
                arrowDiv.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';

                textDiv.appendChild(title);
                textDiv.appendChild(meta);
                
                card.appendChild(iconDiv);
                card.appendChild(textDiv);
                card.appendChild(arrowDiv);
                
                listContainer.appendChild(card);
            });
        }

        function openRecipe(id) {
            activeRecipeId = id;
            renderRecipeDetail(id);
            window.scrollTo(0,0);
            switchView('detailView');
        }

        function renderRecipeDetail(id) {
            const recipe = recipesData.find(r => r.id === id);
            
            // Header styling
            document.getElementById('recipeHeader').className = `h-32 flex items-center justify-center bg-gradient-to-br ${recipe.color}`;
            document.getElementById('recipeEmoji').textContent = recipe.emoji;
            document.getElementById('detailTitle').textContent = recipe.title[currentLang];

            // Ingrédients
            const ingList = document.getElementById('ingredientsList');
            ingList.innerHTML = '';
            recipe.ingredients[currentLang].forEach(ing => {
                const li = document.createElement('li');
                li.className = "flex items-start gap-2 relative pl-4 before:content-[''] before:absolute before:left-0 before:top-2 before:w-1.5 before:h-1.5 before:bg-blue-400 before:rounded-full";
                li.textContent = ing;
                ingList.appendChild(li);
            });

            // Étapes
            const stepsList = document.getElementById('stepsList');
            stepsList.innerHTML = '';
            recipe.steps[currentLang].forEach((step, index) => {
                const stepBlock = document.createElement('div');
                stepBlock.className = "flex gap-4 p-4 bg-white border border-gray-100 rounded-2xl shadow-sm";
                
                const numberDiv = document.createElement('div');
                numberDiv.className = "w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-sm flex-shrink-0";
                numberDiv.textContent = index + 1;
                
                const textDiv = document.createElement('div');
                const stepLabel = document.createElement('span');
                stepLabel.className = "block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1";
                stepLabel.textContent = `${translations[currentLang].stepPrefix} ${index + 1}`;
                
                const stepText = document.createElement('p');
                stepText.className = "text-gray-800 text-base leading-relaxed";
                stepText.textContent = step;

                textDiv.appendChild(stepLabel);
                textDiv.appendChild(stepText);
                
                stepBlock.appendChild(numberDiv);
                stepBlock.appendChild(textDiv);
                
                stepsList.appendChild(stepBlock);
            });
        }

        document.getElementById('backBtn').addEventListener('click', () => {
            switchView('listView');
            activeRecipeId = null;
        });

        // Gestion du menu déroulant de langue
        const langBtn = document.getElementById('langBtn');
        const langMenu = document.getElementById('langMenu');

        langBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            langMenu.classList.toggle('hidden');
        });

        // Fermer le menu si on clique ailleurs
        document.addEventListener('click', () => {
            if (!langMenu.classList.contains('hidden')) {
                langMenu.classList.add('hidden');
            }
        });

        // Initialisation de la langue par défaut pour la page d'accueil
        updateHeader();

    </script>
</body>
</html>
